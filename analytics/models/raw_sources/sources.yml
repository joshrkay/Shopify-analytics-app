  - name: platform
    description: Platform tables for tenant mapping and configuration
    schema: "{{ var('platform_schema', 'platform') }}"
    tables:
      - name: tenant_airbyte_connections
        description: Maps Airbyte connections to tenants for data isolation
        columns:
          - name: airbyte_connection_id
            description: Airbyte connection ID
            tests:
              - not_null
          - name: tenant_id
            description: Tenant identifier
            tests:
              - not_null
          - name: source_type
            description: Type of data source (e.g., shopify)
            tests:
              - not_null
          - name: status
            description: Connection status
            tests:
              - not_null
          - name: is_enabled
            description: Whether connection is enabled
            tests:
              - not_null
          - name: configuration
            description: JSONB configuration containing source-specific metadata (e.g., shop_domain for Shopify)

      - name: shopify_stores
        description: Shopify store metadata linked to tenants (includes timezone, currency, country)
        columns:
          - name: id
            description: Primary key (UUID)
            tests:
              - not_null
          - name: tenant_id
            description: Tenant identifier
            tests:
              - not_null
          - name: shop_domain
            description: Shopify store domain (mystore.myshopify.com)
            tests:
              - not_null
          - name: timezone
            description: Store IANA timezone (e.g., America/New_York)
          - name: status
            description: Installation status (active, inactive, suspended, uninstalled)
