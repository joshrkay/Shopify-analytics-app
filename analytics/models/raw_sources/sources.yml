version: 2

sources:
  - name: raw_shopify
    description: >
      Raw Shopify data ingested via Airbyte Destinations V2 (typed columns).
      Tables contain typed columns directly — no _airbyte_data JSONB blob.
    schema: "{{ var('raw_shopify_schema', 'airbyte_raw') }}"
    freshness:
      warn_after:
        count: "{{ var('freshness_sla', {}).get('shopify_orders', {}).get(var('billing_tier', 'free'), {}).get('warn_after_minutes', 1440) }}"
        period: minute
      error_after:
        count: "{{ var('freshness_sla', {}).get('shopify_orders', {}).get(var('billing_tier', 'free'), {}).get('error_after_minutes', 2880) }}"
        period: minute
    tables:
      - name: orders
        description: Shopify orders (Airbyte V2 typed columns)
        loaded_at_field: _airbyte_extracted_at
        columns:
          - name: _airbyte_raw_id
            description: Airbyte record ID (V2)
            tests:
              - not_null
          - name: _airbyte_extracted_at
            description: Timestamp when record was extracted by Airbyte (V2)
            tests:
              - not_null

      - name: customers
        description: Shopify customers (Airbyte V2 typed columns)
        loaded_at_field: _airbyte_extracted_at
        columns:
          - name: _airbyte_raw_id
            description: Airbyte record ID (V2)
            tests:
              - not_null
          - name: _airbyte_extracted_at
            description: Timestamp when record was extracted by Airbyte (V2)
            tests:
              - not_null

  - name: raw_facebook_ads
    description: >
      Raw Meta (Facebook/Instagram) Ads data via Airbyte Destinations V2.
      Data lands in airbyte_google_ads schema (destination default namespace).
    schema: "{{ var('raw_facebook_ads_schema', 'airbyte_google_ads') }}"
    freshness:
      warn_after:
        count: "{{ var('freshness_sla', {}).get('facebook_ads', {}).get(var('billing_tier', 'free'), {}).get('warn_after_minutes', 1440) }}"
        period: minute
      error_after:
        count: "{{ var('freshness_sla', {}).get('facebook_ads', {}).get(var('billing_tier', 'free'), {}).get('error_after_minutes', 2880) }}"
        period: minute
    tables:
      - name: ad_insights
        identifier: ads_insights
        description: Meta Ads insights (Airbyte V2 typed columns)
        loaded_at_field: _airbyte_extracted_at
        columns:
          - name: _airbyte_raw_id
            description: Airbyte record ID (V2)
            tests:
              - not_null
          - name: _airbyte_extracted_at
            description: Timestamp when record was extracted by Airbyte (V2)
            tests:
              - not_null

  - name: raw_google_ads
    description: >
      Raw Google Ads data via Airbyte Destinations V2.
      Data lands in airbyte_google_ads schema. Table created on first successful sync.
    schema: "{{ var('raw_google_ads_schema', 'airbyte_google_ads') }}"
    freshness:
      warn_after:
        count: "{{ var('freshness_sla', {}).get('google_ads', {}).get(var('billing_tier', 'free'), {}).get('warn_after_minutes', 1440) }}"
        period: minute
      error_after:
        count: "{{ var('freshness_sla', {}).get('google_ads', {}).get(var('billing_tier', 'free'), {}).get('error_after_minutes', 2880) }}"
        period: minute
    tables:
      - name: ad_stats
        identifier: account_performance_report
        description: >
          Google Ads account performance report (Airbyte V2 typed columns).
          Table created on first successful sync — staging model handles missing table gracefully.
        loaded_at_field: _airbyte_extracted_at
        columns:
          - name: _airbyte_raw_id
            description: Airbyte record ID (V2)
          - name: _airbyte_extracted_at
            description: Timestamp when record was extracted by Airbyte (V2)

