version: '3.8'

# Docker Compose for E2E test infrastructure.
# Provides PostgreSQL and Redis for the test environment.
#
# Usage:
#   docker-compose -f tests/e2e/docker/docker-compose.e2e.yml up -d
#   # Wait for services, then run tests
#   docker-compose -f tests/e2e/docker/docker-compose.e2e.yml down -v

services:
  postgres-e2e:
    image: postgres:15
    environment:
      POSTGRES_USER: e2e_test
      POSTGRES_PASSWORD: e2e_test
      POSTGRES_DB: e2e_test_db
    ports:
      - "5433:5432"  # Use 5433 to avoid conflict with local PG
    volumes:
      - ./seed.sql:/docker-entrypoint-initdb.d/01-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U e2e_test"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis-e2e:
    image: redis:7-alpine
    ports:
      - "6380:6379"  # Use 6380 to avoid conflict with local Redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
