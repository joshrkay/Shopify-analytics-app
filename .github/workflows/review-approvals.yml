name: Human Approval Gate

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  contents: read
  pull-requests: read
  statuses: write

jobs:
  approvals:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce L1 + L2 approvals
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const prNumber = context.payload.pull_request
              ? context.payload.pull_request.number
              : context.payload.review.pull_request_url.split('/').pop();

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: Number(prNumber),
            });

            const { data: reviews } = await github.rest.pulls.listReviews({
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const latestByUser = new Map();
            for (const review of reviews) {
              latestByUser.set(review.user.login, review.state);
            }

            const approvals = [...latestByUser.values()].filter(s => s === 'APPROVED').length;
            const passed = approvals >= 2;

            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha: pr.head.sha,
              state: passed ? 'success' : 'pending',
              context: 'review/human-approval',
              description: passed
                ? `Approval gate passed (${approvals}/2)`
                : `Awaiting approvals (${approvals}/2)`
            });
