name: Cross-Browser E2E

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  contents: read
  pull-requests: read

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.approvals.outputs.should_run }}
    steps:
      - name: Check L1/L2 approval gate
        id: approvals
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const prNumber = context.payload.pull_request
              ? context.payload.pull_request.number
              : context.payload.review.pull_request_url.split('/').pop();

            const { data: reviews } = await github.rest.pulls.listReviews({
              owner,
              repo,
              pull_number: Number(prNumber),
              per_page: 100,
            });

            const latestByUser = new Map();
            for (const review of reviews) {
              latestByUser.set(review.user.login, review.state);
            }

            const approvals = [...latestByUser.values()].filter((state) => state === 'APPROVED').length;
            const shouldRun = approvals >= 2;

            core.info(`Approvals: ${approvals}. Running browser E2E: ${shouldRun}`);
            core.setOutput('should_run', shouldRun ? 'true' : 'false');

  e2e:
    name: qa/cross-browser-e2e (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run cross-browser smoke suite
        run: npm run test:e2e -- --project=${{ matrix.browser }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: frontend/playwright-report/
          if-no-files-found: ignore
